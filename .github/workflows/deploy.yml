name: Deploy to GCP & Sync GitLab

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/422672911015/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-deployer@techindiana.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy techindiana-voice \
            --source . \
            --region us-central1 \
            --allow-unauthenticated \
            --port 8080 \
            --project techindiana

  mirror-gitlab:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitLab
        run: |
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/sankethrajpatil/TechIndiana.git
          git push gitlab main --force
